<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموظفين - نظام متابعة الإنذارات</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-icon">
                <i data-lucide="shield-alert"></i>
            </div>
            <a href="index.html" class="sidebar-brand">نظام الإنذارات</a>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <i data-lucide="layout-dashboard"></i>
                <span>لوحة التحكم</span>
            </a>
            <a href="employees.html" class="nav-item active">
                <i data-lucide="users"></i>
                <span>الموظفين</span>
            </a>
            <a href="warnings.html" class="nav-item">
                <i data-lucide="file-text"></i>
                <span>سجل الإنذارات</span>
            </a>
            <a href="add-warning.html" class="nav-item">
                <i data-lucide="plus-circle"></i>
                <span>إضافة إنذار</span>
            </a>
            <a href="add-employee.html" class="nav-item">
                <i data-lucide="user-plus"></i>
                <span>إضافة موظف</span>
            </a>
            <a href="reports.html" class="nav-item">
                <i data-lucide="bar-chart-2"></i>
                <span>التقارير</span>
            </a>
            <a href="settings.html" class="nav-item">
                <i data-lucide="settings"></i>
                <span>الإعدادات</span>
            </a>
            <a href="login.html" class="nav-item" style="color: var(--red); margin-top: auto;">
                <i data-lucide="log-out"></i>
                <span>تسجيل الخروج</span>
            </a>
        </nav>
    </aside>

    <!-- Main Wrapper -->
    <div class="main-wrapper">
        <header class="top-bar animate-fade">
            <div class="page-title">
                <h1>قائمة الموظفين</h1>
                <p>إدارة بيانات العاملين في النظام</p>
            </div>
        </header>

        <section class="modern-card animate-fade" style="animation-delay: 0.1s;">
            <div class="card-head">
                <h2>بيانات الموظفين</h2>
            </div>
            <div class="card-body">
                    <!-- مربع البحث -->
                    <div style="margin-bottom:15px;">
                        <input 
                            type="text"
                            id="searchEmployee"
                            placeholder="🔎 ابحث عن موظف بالاسم..."
                            onkeyup="searchEmployee()"
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; font-family:Tajawal;"
                        >
                    </div>
                
                    <div class="table-container">
                    <table>
                        <thead>
                                <tr>
                                        <th>رقم الموظف</th>
                                        <th>الاسم</th>
                                        <th>القسم</th>
                                        <th>المنصب</th>
                                        <th>كلمة المرور</th>
                                        <th>إجراءات</th>
                                    </tr>
                        </thead>
                        <tbody id="employee-list-body">
                            <!-- Populated by script.js -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <!-- Mobile Navigation -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-link-mobile">
            <i data-lucide="layout-dashboard"></i>
            <span>الرئيسية</span>
        </a>
        <a href="employees.html" class="nav-link-mobile active">
            <i data-lucide="users"></i>
            <span>الموظفين</span>
        </a>
        <a href="warnings.html" class="nav-link-mobile">
            <i data-lucide="file-text"></i>
            <span>الإنذارات</span>
        </a>
        <a href="add-warning.html" class="nav-link-mobile">
            <i data-lucide="plus-circle"></i>
            <span>إضافة</span>
        </a>
    </nav>

    <script src="script.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
